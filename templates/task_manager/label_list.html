{% extends "base.html" %}

{% block content %}
<h1>Метки</h1>

<a href="{% url 'label_create' %}" class="btn btn-primary mb-3">
    Создать метку
</a>

<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Имя</th>
      <th>Действия</th>
    </tr>
  </thead>
  <tbody>
    {% for label in labels %}
      <tr>
        <td>{{ label.id }}</td>
        <td>{{ label.name }}</td>
        <td>
          <a href="{% url 'label_update' label.id %}" class="btn btn-sm btn-warning">
              Изменить
          </a>
          <a href="{% url 'label_delete' label.id %}" class="btn btn-sm btn-danger">
              Удалить
          </a>
        </td>
      </tr>
    {% empty %}
      <tr>
        <td colspan="3">Нет меток</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
